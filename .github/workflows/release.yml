name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test -- --run

      # Some tests execute scripts/plugin-setup.mjs against the real
      # hooks/hooks.json and rewrite bare `node` to the absolute node binary
      # path of the runner (e.g. /opt/hostedtoolcache/node/.../bin/node). If we
      # let that mutated file ship, every end user inherits a node path that
      # does not exist on their machine. Restore the file to its committed
      # state before publishing. See issue #2348.
      - name: Restore hooks.json before publish
        run: git checkout -- hooks/hooks.json

      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view oh-my-claude-sisyphus@$VERSION version 2>/dev/null; then
            echo "::warning::Version $VERSION already published to npm, skipping publish"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Run release.ts normally so it writes .github/release-body.md in the
          # ephemeral CI workspace. The tag version is already set before this
          # workflow runs, so the generated file can be consumed directly.
          npx tsx scripts/release.ts "$VERSION" 2>/dev/null || true
          if [ -f .github/release-body.md ]; then
            echo "Using freshly generated release-body.md"
            cp .github/release-body.md release-notes.md
          else
            echo "Falling back to GitHub auto-generated notes"
            echo "## oh-my-claudecode v${VERSION}" > release-notes.md
            echo "" >> release-notes.md
            echo "### Install / Update" >> release-notes.md
            echo '```bash' >> release-notes.md
            echo "npm install -g oh-my-claude-sisyphus@${VERSION}" >> release-notes.md
            echo '```' >> release-notes.md
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
